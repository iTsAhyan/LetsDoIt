name: LetsDoIt
on:
  push:
    paths:
      - 'script.txt'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install -r requirements.txt
      - name: Run
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          PEXELS_KEY: ${{ secrets.PEXELS_KEY }}
        run: python app.py
