name: Ahyan Engine
on:
  push:
    paths:
      - 'script.txt'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install moviepy==1.0.3 edge-tts requests huggingface_hub proglog
      - name: Run Script
        run: python app.py
